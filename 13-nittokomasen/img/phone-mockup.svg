<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 560" fill="none">
  <defs>
    <linearGradient id="phoneFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafaf5"/>
      <stop offset="100%" stop-color="#f5f1e8"/>
    </linearGradient>
    <linearGradient id="taskCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#fafaf2"/>
    </linearGradient>
    <linearGradient id="appHeader" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8b876"/>
      <stop offset="100%" stop-color="#8a8566"/>
    </linearGradient>
    <filter id="phoneShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- スマホ本体 -->
  <g filter="url(#phoneShadow)">
    <rect x="20" y="20" width="240" height="520" rx="38" fill="url(#phoneFrame)"/>
    <rect x="26" y="26" width="228" height="508" rx="32" fill="#000"/>
    <!-- スクリーン -->
    <rect x="32" y="32" width="216" height="496" rx="28" fill="url(#screenBg)"/>
    <!-- ノッチ -->
    <rect x="100" y="32" width="80" height="22" rx="11" fill="#000"/>
    <circle cx="172" cy="43" r="3" fill="#1a1a1a"/>
    <!-- ステータスバー -->
    <text x="50" y="48" font-family="sans-serif" font-size="10" font-weight="900" fill="#1a1a1a">9:41</text>
    <g transform="translate(220, 38)">
      <rect x="0" y="2" width="14" height="6" rx="1" fill="#1a1a1a"/>
      <rect x="14" y="3" width="2" height="4" rx="0.5" fill="#1a1a1a"/>
    </g>
    <!-- アプリヘッダー -->
    <rect x="32" y="60" width="216" height="60" fill="url(#appHeader)"/>
    <text x="48" y="80" font-family="sans-serif" font-size="9" font-weight="700" fill="#fff" letter-spacing="2">FAST-UP CARRY</text>
    <text x="48" y="105" font-family="serif" font-size="20" font-weight="900" fill="#fff">今日のメニュー</text>
    <text x="232" y="105" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">火 / 5月15日</text>
    <!-- 進捗バー -->
    <rect x="48" y="135" width="184" height="8" rx="4" fill="#fff" stroke="#c8b876" stroke-width="1"/>
    <rect x="48" y="135" width="55" height="8" rx="4" fill="#8a8566"/>
    <text x="48" y="160" font-family="sans-serif" font-size="10" fill="#666">本日の進捗</text>
    <text x="232" y="160" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="900" fill="#8a8566">2/5 完了</text>
    <!-- タスク1（完了） -->
    <g transform="translate(48, 175)">
      <rect width="184" height="50" rx="8" fill="url(#taskCard)" stroke="#c8b876" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="50" rx="2" fill="#8a8566"/>
      <!-- チェック -->
      <circle cx="20" cy="25" r="9" fill="#8a8566"/>
      <path d="M16 25 L19 28 L25 22" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="20" font-family="sans-serif" font-size="9" font-weight="700" fill="#8a8566">英語</text>
      <text x="36" y="34" font-family="sans-serif" font-size="11" font-weight="900" fill="#1a1a1a">単語帳 p.32-40（50語）</text>
      <text x="36" y="44" font-family="sans-serif" font-size="9" fill="#888">30分</text>
    </g>
    <!-- タスク2（完了） -->
    <g transform="translate(48, 233)">
      <rect width="184" height="50" rx="8" fill="url(#taskCard)" stroke="#c8b876" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="50" rx="2" fill="#8a8566"/>
      <circle cx="20" cy="25" r="9" fill="#8a8566"/>
      <path d="M16 25 L19 28 L25 22" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="20" font-family="sans-serif" font-size="9" font-weight="700" fill="#8a8566">英語</text>
      <text x="36" y="34" font-family="sans-serif" font-size="11" font-weight="900" fill="#1a1a1a">英文法 vintage p.15-22</text>
      <text x="36" y="44" font-family="sans-serif" font-size="9" fill="#888">45分</text>
    </g>
    <!-- タスク3（実行中・ハイライト） -->
    <g transform="translate(48, 291)">
      <rect width="184" height="50" rx="8" fill="#faf6e8" stroke="#8a8566" stroke-width="2"/>
      <rect x="0" y="0" width="4" height="50" rx="2" fill="#c8b876"/>
      <!-- 実行中マーク -->
      <circle cx="20" cy="25" r="9" fill="#fff" stroke="#8a8566" stroke-width="2"/>
      <circle cx="20" cy="25" r="4" fill="#c8b876"/>
      <text x="36" y="20" font-family="sans-serif" font-size="9" font-weight="700" fill="#8a8566">国語</text>
      <text x="36" y="34" font-family="sans-serif" font-size="11" font-weight="900" fill="#1a1a1a">古文単語 p.10-18</text>
      <text x="36" y="44" font-family="sans-serif" font-size="9" fill="#666">30分・実行中</text>
    </g>
    <!-- タスク4（未着手） -->
    <g transform="translate(48, 349)">
      <rect width="184" height="50" rx="8" fill="url(#taskCard)" stroke="#e0d8b8" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="50" rx="2" fill="#ccc"/>
      <circle cx="20" cy="25" r="9" fill="#fff" stroke="#ccc" stroke-width="2"/>
      <text x="36" y="20" font-family="sans-serif" font-size="9" font-weight="700" fill="#999">日本史</text>
      <text x="36" y="34" font-family="sans-serif" font-size="11" font-weight="900" fill="#666">山川教科書 第3章</text>
      <text x="36" y="44" font-family="sans-serif" font-size="9" fill="#aaa">60分</text>
    </g>
    <!-- タスク5（未着手・夜の模試） -->
    <g transform="translate(48, 407)">
      <rect width="184" height="50" rx="8" fill="url(#taskCard)" stroke="#e0d8b8" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="50" rx="2" fill="#ccc"/>
      <circle cx="20" cy="25" r="9" fill="#fff" stroke="#ccc" stroke-width="2"/>
      <text x="36" y="20" font-family="sans-serif" font-size="9" font-weight="700" fill="#999">夜のミニ模試</text>
      <text x="36" y="34" font-family="sans-serif" font-size="11" font-weight="900" fill="#666">英文法 範囲：p.1-22</text>
      <text x="36" y="44" font-family="sans-serif" font-size="9" fill="#aaa">20分</text>
    </g>
    <!-- ボトムタブ -->
    <rect x="32" y="478" width="216" height="50" fill="#fff"/>
    <line x1="32" y1="478" x2="248" y2="478" stroke="#eee" stroke-width="1"/>
    <g transform="translate(60, 495)">
      <rect width="22" height="22" rx="4" fill="#8a8566"/>
      <text x="11" y="16" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="900" fill="#fff">⌂</text>
    </g>
    <g transform="translate(120, 495)">
      <circle cx="11" cy="11" r="9" fill="none" stroke="#aaa" stroke-width="1.5"/>
      <text x="11" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">📊</text>
    </g>
    <g transform="translate(180, 495)">
      <text x="11" y="15" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#aaa">💬</text>
    </g>
    <!-- ホームインジケーター -->
    <rect x="100" y="525" width="80" height="3" rx="1.5" fill="#1a1a1a"/>
  </g>
</svg>
