<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" fill="none">
  <!-- 合格者の人型（ゴールドグラデ） -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d896"/>
      <stop offset="50%" stop-color="#c8b876"/>
      <stop offset="100%" stop-color="#8a8566"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3528"/>
      <stop offset="100%" stop-color="#5a5340"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#8a8566" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- 影 -->
  <ellipse cx="40" cy="115" rx="22" ry="3" fill="#c8b876" opacity="0.4"/>
  <!-- 体 -->
  <path d="M22 50 Q22 42 28 40 L52 40 Q58 42 58 50 L58 95 Q58 100 53 100 L27 100 Q22 100 22 95 Z" fill="url(#goldGrad)" filter="url(#shadow)"/>
  <!-- 首 -->
  <rect x="35" y="33" width="10" height="10" fill="#a89860"/>
  <!-- 頭 -->
  <circle cx="40" cy="22" r="14" fill="url(#goldGrad)"/>
  <!-- 髪 -->
  <path d="M26 18 Q26 8 40 8 Q54 8 54 18 Q54 14 50 12 Q40 16 30 12 Q26 14 26 18 Z" fill="url(#hairGrad)"/>
  <!-- 達成マーク（星形） -->
  <text x="55" y="18" font-family="Arial" font-size="16" font-weight="bold" fill="#fff" stroke="#8a8566" stroke-width="0.5">★</text>
  <!-- ハイライト -->
  <ellipse cx="35" cy="18" rx="4" ry="3" fill="#fff" opacity="0.4"/>
</svg>
